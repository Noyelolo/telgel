<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introverted IT Guy Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden; /* Товч дэлгэцээс гарахаас сэргийлж гүйлгэх хэсгийг хаана */
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.12);
            max-width: 600px;
            position: relative;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            position: relative;
            min-height: 80px;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yes-btn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        #yes-btn:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        #no-btn {
            background-color: #e74c3c;
            color: white;
            position: absolute; /* Зугтах боломжтой болгох үүднээс absolute байрлал өгөв */
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
            top: 0;
        }

        #message {
            margin-top: 30px;
            font-size: 22px;
            font-weight: 500;
            color: #f1c40f;
            min-height: 40px;
        }
        
        /* Responsive жижиг дэлгэцэд зориулав */
        @media (max-width: 500px) {
            h1 { font-size: 24px; }
            button { padding: 12px 25px; font-size: 16px; }
            .buttons { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Would you date an introverted IT guy?</h1>
        <div class="buttons">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
        <div id="message"></div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const messageDiv = document.getElementById('message');

        // YES товчлуур дээр дарах үед
        yesBtn.addEventListener('click', () => {
            messageDiv.innerHTML = "Баяр хүргье! Та насан туршийнхаа хувийн IT техникийн дэмжлэгийг (болон хайр сэтгэлийг) оллоо! 💻❤️";
            noBtn.style.display = 'none'; // No товчийг алга болгох
        });

        // NO товчлуур дээр хулгана очиход зугтах функц
        noBtn.addEventListener('mouseover', () => {
            // Дэлгэцийн хэмжээг авч товчлуурыг санамсаргүй байрлал руу шилжүүлнэ
            const container = document.querySelector('.container');
            const rect = container.getBoundingClientRect();
            
            // Товчлуур үндсэн хайрцагнаас гарахгүйгээр дотроо зугтах хязгаар
            const maxX = rect.width - noBtn.offsetWidth - 20;
            const maxY = rect.height - noBtn.offsetHeight - 20;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
            
            // Хөгжилтэй үг гаргах
            const funTexts = [
                "Энэ товч яг л тэр залуу шиг 'комфорт зона'-оосоо гарч чадахгүй зугтаж байна! 🏃‍♂️💨",
                "Гэрийн Wi-Fi тасрах вий дээ, дахин нэг бодоорой! 📶",
                "Хулганаас зугтах ч яамай, системийн алдаагаа олж засварлана даа. 🔄"
            ];
            const randomText = funTexts[Math.floor(Math.random() * funTexts.length)];
            messageDiv.innerHTML = randomText;
        });
    </script>
</body>
</html>

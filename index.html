<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic IT Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden; 
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 650px;
            z-index: 2; 
        }

        h1 {
            font-size: 34px;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .buttons-wrapper {
            position: relative;
            width: 100%;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
            margin-top: 30px;
        }

        button {
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yes-btn {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.5);
            z-index: 5;
        }

        #yes-btn:hover {
            background-color: #ff2b48;
            transform: scale(1.08);
        }

        #no-btn {
            background-color: #a4b0be;
            color: white;
            box-shadow: 0 5px 20px rgba(164, 176, 190, 0.5);
            position: absolute; 
            transition: left 0.3s ease, top 0.3s ease;
            z-index: 5;
        }

        #message {
            margin-top: 35px;
            font-size: 22px;
            font-weight: 600;
            color: #fff200;
            min-height: 70px;
            max-width: 500px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        /* Солют буудах эффект (Fireworks) */
        .firework-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 105vh;
            pointer-events: none;
            z-index: 1;
        }

        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
                box-shadow: 0 0 0 0 #ff4757, 0 0 0 0 #fff200, 0 0 0 0 #70a1ff;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: scale(80);
                opacity: 0;
                box-shadow: 0 0 20px 10px #ff4757, 0 0 40px 20px #fff200, 0 0 60px 30px #70a1ff;
            }
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 26px; }
            button { padding: 12px 30px; font-size: 18px; }
            .buttons-wrapper { gap: 40px; }
        }
    </style>
</head>
<body>

    <div class="firework-container" id="fireworks"></div>

    <div class="container">
        <h1>Would you date an introverted IT guy?</h1>
        <div class="buttons-wrapper">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
        <div id="message"></div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const messageDiv = document.getElementById('message');
        const fireworksContainer = document.getElementById('fireworks');

        // Эхлэлд No товчлуурыг байрлуулах
        noBtn.style.left = '60%';
        noBtn.style.top = '35%';

        // YES товчлуур дарахад
        yesBtn.addEventListener('click', () => {
            messageDiv.innerHTML = "Баяр хүргье! Та насан туршийнхаа хувийн IT техникийн дэмжлэгийг (болон хайр сэтгэлийг) оллоо! 💻❤️";
            noBtn.style.display = 'none'; 
            triggerFireworks(); 
        });

        // NO товчлуур дээр хулгана очиход зугтах функц
        noBtn.addEventListener('mouseover', () => {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            const padding = 50;
            const maxX = screenWidth - btnWidth - padding;
            const maxY = screenHeight - btnHeight - padding;

            let randomX, randomY;
            let isTooClose = true;

            while (isTooClose) {
                randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
                randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

                const containerRect = document.querySelector('.container').getBoundingClientRect();
                
                if (
                    randomX + btnWidth < containerRect.left || 
                    randomX > containerRect.right || 
                    randomY + btnHeight < containerRect.top || 
                    randomY > containerRect.bottom
                ) {
                    isTooClose = false;
                }
            }

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
            
            const funTexts = [
                "Энэ товч яг л тэр залуу шиг 'комфорт зона'-оосоо гарч чадахгүй зугтаж байна! 🏃‍♂️💨",
                "Гэрийн Wi-Fi тасрах вий дээ, дахин нэг бодоорой! 📶",
                "Хулганаас зугтах ч яамай, системийн алдаагаа олж засварлана даа. 🔄",
                "Алдааг дахин нэг шалгаад үзээрэй, 'No' гэдэг чинь системд байхгүй утга шүү! 💻",
                "Клобоны ард нуугдаад зугтааж байна даа... 😄"
            ];
            const randomText = funTexts[Math.floor(Math.random() * funTexts.length)];
            messageDiv.innerHTML = randomText;
        });

        // Солют буудах функц
        function triggerFireworks() {
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const firework = document.createElement('div');
                    firework.classList.add('firework');
                    
                    firework.style.left = Math.random() * 80 + 10 + '%';
                    firework.style.top = Math.random() * 60 + 20 + '%';
                    
                    const colors = ['#ff4757', '#fff200', '#70a1ff', '#2ed573', '#ffa502'];
                    firework.style.animation = `explode 1.2s ease-out forwards`;
                    
                    fireworksContainer.appendChild(firework);

                    setTimeout(() => {
                        firework.remove();
                    }, 1200);
                }, i * 200); 
            }
        }
    </script>
</body>
</html>

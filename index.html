<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic IT Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden; 
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 650px;
            z-index: 2; 
        }

        h1 {
            font-size: 34px;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            margin-top: 30px;
            width: 100%;
            min-height: 80px;
        }

        button {
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yes-btn {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.5);
        }

        #yes-btn:hover {
            background-color: #ff2b48;
            transform: scale(1.08);
        }

        #no-btn {
            background-color: #a4b0be;
            color: white;
            box-shadow: 0 5px 20px rgba(164, 176, 190, 0.5);
            z-index: 10;
            transition: left 0.2s ease, top 0.2s ease; /* Гөлгөр шилжилт нэмэв */
        }

        #message {
            margin-top: 35px;
            font-size: 22px;
            font-weight: 600;
            color: #fff200;
            min-height: 70px;
            max-width: 500px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        /* Эможи борооны загвар (дэлгэцийн дээрээс эхлэх) */
        .emoji-drop {
            position: fixed;
            top: -60px; /* Дэлгэцийн харагдах хэсгээс дээгүүр байрлуулна */
            font-size: 30px;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            0% {
                transform: translateY(0px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 26px; }
            button { padding: 12px 30px; font-size: 18px; }
            .buttons { gap: 25px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Would you date an introverted IT guy?</h1>
        <div class="buttons">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
        <div id="message"></div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const messageDiv = document.getElementById('message');

        // YES товчлуур дарахад
        yesBtn.addEventListener('click', () => {
            messageDiv.innerHTML = "Баяр хүргье! Та насан туршийнхаа хувийн IT техникийн дэмжлэгийг (болон хайр сэтгэлийг) оллоо! 💻❤️";
            noBtn.style.display = 'none'; 
            startEmojiRain(); 
        });

        // NO товчлуур дээр хулгана очиход зугтах функц (дэлгэцээс гарахгүйгээр)
        noBtn.addEventListener('mouseover', () => {
            noBtn.style.position = 'fixed';
            
            // Дэлгэцийн болон товчлуурын хэмжээг нарийн авах
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // Товчлуур дэлгэцийн захад тулахгүй байх хязгаар (дор хаяж 40px зай үлдээнэ)
            const padding = 40;
            const maxX = screenWidth - btnWidth - padding;
            const maxY = screenHeight - btnHeight - padding;

            let randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            let randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            // Төв хэсгийн кнопууд болон текстээс хол байлгах шалгалт
            const avoidCenterX = screenWidth / 2 - 300;
            const avoidCenterEndX = screenWidth / 2 + 300;
            const avoidCenterY = screenHeight / 2 - 200;
            const avoidCenterEndY = screenHeight / 2 + 200;

            if (randomX > avoidCenterX && randomX < avoidCenterEndX && randomY > avoidCenterY && randomY < avoidCenterEndY) {
                // Хэрвээ гол руу унавал аль нэг булан руу зайлуулах
                randomX = randomX < screenWidth / 2 ? padding : screenWidth - btnWidth - padding;
                randomY = randomY < screenHeight / 2 ? padding : screenHeight - btnHeight - padding;
            }

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
            
            // Хөгжилтэй үгс
            const funTexts = [
                "Энэ товч яг л тэр залуу шиг 'комфорт зона'-оосоо гарч чадахгүй зугтаж байна! 🏃‍♂️💨",
                "Гэрийн Wi-Fi тасрах вий дээ, дахин нэг бодоорой! 📶",
                "Хулганаас зугтах ч яамай, системийн алдаагаа олж засварлана даа. 🔄",
                "Алдааг дахин нэг шалгаад үзээрэй, 'No' гэдэг чинь системд байхгүй утга шүү! 💻",
                "Клобоны ард нуугдаад зугтааж байна даа... 😄"
            ];
            const randomText = funTexts[Math.floor(Math.random() * funTexts.length)];
            messageDiv.innerHTML = randomText;
        });

        // Эможи бороо оруулах функц
        function startEmojiRain() {
            const emojis = ['❤️', '💻', '⚙️', '✨', '🚀', '☕', '💖', '👩‍❤️‍👨'];
            
            for (let i = 0; i < 40; i++) {
                const emoji = document.createElement('div');
                emoji.classList.add('emoji-drop');
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Дэлгэцийн өргөний дагуу дурын цэгээс унагах
                emoji.style.left = Math.random() * 95 + 'vw';
                // 2.5 - 4.5 секундийн хооронд унах хурд
                emoji.style.animationDuration = Math.random() * 2 + 2.5 + 's'; 
                emoji.style.fontSize = Math.random() * 20 + 25 + 'px';
                
                document.body.appendChild(emoji);
                
                // Хугацаа дуусахад DOM-оос устгах
                setTimeout(() => {
                    emoji.remove();
                }, 5000);
            }
        }
    </script>
</body>
</html>

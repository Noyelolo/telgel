<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mj IT Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #c471ed 0%, #f64f59 50%, #f7971e 100%);
      overflow: hidden;
    }

    #quiz-root {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-blobs { position: absolute; inset: 0; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; opacity: 0.18; }

    .card {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 20px;
      padding: 40px 44px;
      max-width: 560px;
      width: 90%;
      text-align: center;
      position: relative;
      z-index: 3;
      backdrop-filter: blur(16px);
    }

    .heart-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
      animation: hpulse 1.8s ease-in-out infinite;
    }

    @keyframes hpulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.35;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 32px;
      font-weight: 600;
    }

    .btn-yes {
      background: #fff;
      color: #e8175d;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      padding: 14px 44px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(232,23,93,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
      margin: 0 auto 20px;
    }

    .btn-yes:hover {
      transform: scale(1.07);
      box-shadow: 0 8px 32px rgba(232,23,93,0.5);
    }

    #no-btn {
      background: rgba(255,255,255,0.22);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 18px;
      border: 2px solid rgba(255,255,255,0.55);
      border-radius: 50px;
      padding: 14px 44px;
      cursor: pointer;
      position: absolute;
      z-index: 20;
      white-space: nowrap;
      transition: left 0.1s, top 0.1s;
    }

    .message-box {
      min-height: 56px;
      font-size: 15px;
      font-weight: 700;
      color: #fff200;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      line-height: 1.5;
      margin-top: 8px;
    }

    .success-msg {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      line-height: 1.6;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .fw-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    @keyframes burst {
      0% { transform: scale(0); opacity: 1; }
      60% { opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="quiz-root">
  <div class="bg-blobs">
    <div class="blob" style="width:320px;height:320px;background:#fff;top:-80px;left:-100px;"></div>
    <div class="blob" style="width:220px;height:220px;background:#f7971e;bottom:-50px;right:-60px;"></div>
    <div class="blob" style="width:150px;height:150px;background:#c471ed;bottom:80px;left:60px;"></div>
    <div class="blob" style="width:110px;height:110px;background:#fff;top:100px;right:40px;"></div>
  </div>

  <div class="fw-container" id="fw-container"></div>

  <div class="card" id="card">
    <span class="heart-icon">💻❤️</span>
    <div class="title">Would you date an introverted IT guy?</div>
    <div class="subtitle">Think carefully before answering...</div>
    <button class="btn-yes" id="yes-btn">Yes 💖</button>
    <div class="message-box" id="message"></div>
  </div>

  <button id="no-btn">No</button>
</div>

<script>
(function(){
  const root  = document.getElementById('quiz-root');
  const card  = document.getElementById('card');
  const yesBtn = document.getElementById('yes-btn');
  const noBtn  = document.getElementById('no-btn');
  const msg    = document.getElementById('message');
  const fw     = document.getElementById('fw-container');

  const texts = [
"This button is just like that ERP guy — running away from his comfort zone! 🏃‍♂️💨",
"Careful! You might lose access to your ERP account. Think again! 🔐",
"Hiding behind a keyboard and avoiding the answer... 🙈",
"404: Correct answer not found. There's only one right choice! 🔍",
"Bug Report: Wrong button clicked. Please submit a fix! 🐛",
"Careful! Penalties might keep getting added to your payroll. Think twice! 💸",
  ];

  function placeNo() {
    const rw = root.offsetWidth;
    const rh = root.offsetHeight;
    const bw = noBtn.offsetWidth || 130;
    const bh = noBtn.offsetHeight || 52;
    const pad = 16;

    const cardLeft   = card.offsetLeft;
    const cardTop    = card.offsetTop;
    const cardRight  = cardLeft + card.offsetWidth;
    const cardBottom = cardTop  + card.offsetHeight;

    for (let i = 0; i < 80; i++) {
      const x = pad + Math.random() * (rw - bw - pad * 2);
      const y = pad + Math.random() * (rh - bh - pad * 2);
      const overlapX = x + bw > cardLeft && x < cardRight;
      const overlapY = y + bh > cardTop  && y < cardBottom;
      if (!(overlapX && overlapY)) {
        noBtn.style.left = x + 'px';
        noBtn.style.top  = y + 'px';
        return;
      }
    }
    // fallback
    noBtn.style.left = pad + 'px';
    noBtn.style.top  = pad + 'px';
  }

  // initial placement: just below/beside the card
  requestAnimationFrame(() => {
    noBtn.style.left = (root.offsetWidth / 2 + card.offsetWidth / 2 - noBtn.offsetWidth / 2) + 'px';
    noBtn.style.top  = (root.offsetHeight / 2 + card.offsetHeight / 2 - noBtn.offsetHeight / 2 - 10) + 'px';
  });

  noBtn.addEventListener('mouseenter', () => {
    placeNo();
    msg.textContent = texts[Math.floor(Math.random() * texts.length)];
  });

  noBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    placeNo();
    msg.textContent = texts[Math.floor(Math.random() * texts.length)];
  });

  yesBtn.addEventListener('click', () => {
    noBtn.style.display = 'none';
    msg.innerHTML = '<div class="success-msg">🎉 Congratulations! 🎉<br>You’ve found your lifetime personal ERP technical support specialist... and the love of your life! 💻❤️</div>';
    fireworks();
  });

  function fireworks() {
    const colors = ['#ff4757','#fff200','#70a1ff','#2ed573','#ffa502','#ff6b81','#eccc68','#a29bfe','#fd79a8'];
    for (let w = 0; w < 5; w++) {
      setTimeout(() => {
        const cx = 15 + Math.random() * 70;
        const cy = 10 + Math.random() * 70;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const n = 14 + Math.floor(Math.random() * 8);
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2;
          const d = 8 + Math.random() * 10;
          const px = cx + Math.cos(a) * d;
          const py = cy + Math.sin(a) * d;
          const size = 4 + Math.random() * 5;
          const isBar = Math.random() > 0.5;
          const el = document.createElement('div');
          el.style.cssText = `position:absolute;left:${Math.max(1,Math.min(99,px))}%;top:${Math.max(1,Math.min(99,py))}%;width:${size}px;height:${isBar?size*2.5:size}px;border-radius:${isBar?'2px':'50%'};background:${color};pointer-events:none;animation:burst ${0.9+Math.random()*0.5}s ease-out ${Math.random()*0.15}s forwards;`;
          fw.appendChild(el);
          setTimeout(() => el.remove(), 1800);
        }
        const flash = document.createElement('div');
        flash.style.cssText = `position:absolute;left:${cx}%;top:${cy}%;width:18px;height:18px;border-radius:50%;background:#fff;pointer-events:none;animation:burst 0.5s ease-out forwards;`;
        fw.appendChild(flash);
        setTimeout(() => flash.remove(), 600);
      }, w * 300 + Math.random() * 80);
    }
  }
})();
</script>

</body>
</html>
